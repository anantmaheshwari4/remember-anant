<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remember, Anant</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#3c1053" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="screen" id="today-screen">
      <header class="top-bar">
        <p class="app-name">Remember, Anant</p>
        <p class="date" id="today-date">MONDAY · MAY 4</p>
      </header>

      <main class="thought-area">
        <p class="thought" id="today-thought">Loading your thought…</p>
      </main>

      <footer class="actions">
        <button class="btn-primary">All thoughts →</button>
        <a class="btn-secondary" href="#">Add a new one</a>
      </footer>
    </div>
<div class="screen" id="all-screen">
      <header class="top-bar">
        <button class="btn-back" id="btn-back-from-all">← Back</button>
        <p class="app-name">All thoughts</p>
      </header>

      <main class="thoughts-list" id="thoughts-list">
        <!-- thoughts will be inserted here by JS -->
      </main>
    </div>
<div class="screen" id="add-screen">
      <header class="top-bar">
        <button class="btn-back" id="btn-back-from-add">← Back</button>
        <p class="app-name">Add a thought</p>
      </header>

      <main class="add-area">
        <textarea 
          id="new-thought-input" 
          class="thought-input" 
          placeholder="Type your thought here…"
          maxlength="300"
        ></textarea>
        <p class="char-count" id="char-count">0 / 300</p>
      </main>

<footer class="actions">
        <button class="btn-primary" id="btn-all-thoughts">All thoughts →</button>
        <button class="btn-primary" id="btn-history" style="background: rgba(245,237,224,0.08); border: 1px solid rgba(245,237,224,0.15);">History →</button>
        <a class="btn-secondary" href="#">Add a new one</a>
      </footer>
    </div>
<div class="screen" id="history-screen">
      <header class="top-bar">
        <button class="btn-back" id="btn-back-from-history">← Back</button>
        <p class="app-name">History</p>
      </header>

      <main class="thoughts-list" id="history-list">
        <!-- history will be inserted here by JS -->
      </main>
    </div>
    <script src="app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }
    </script>
  </body>
</html>
